# .github/workflows/static-pages.yml
name: Deploy CathedralOS Observatory

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs in progress for newer commits
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v5

      - name: Upload Observatory Static Assets
        uses: actions/upload-pages-artifact@v3
        with:
          # Target the exact source directory containing cosmicos.html
          path: 'src/web'

      - name: Deploy Live Viewport to Pages
        id: deployment
        uses: actions/deploy-pages@v4

