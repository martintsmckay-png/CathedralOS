<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CathedralOS // COSMICOS Core</title>
    <style>
        :root {
            --matrix-glow: #a855f7;
            --terminal-bg: #090712;
            --panel-bg: #130f26;
            --text-main: #d1caec;
            --text-muted: #6b609c;
            --success: #22c55e;
            --alert: #ef4444;
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .engine-core {
            background-color: var(--panel-bg);
            border: 2px solid var(--matrix-glow);
            border-radius: 8px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.15);
        }

        .header {
            border-bottom: 1px dashed var(--text-muted);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mode-badge {
            font-size: 0.8em;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--matrix-glow);
            color: var(--matrix-glow);
            cursor: pointer;
            text-transform: uppercase;
        }

        .metric-display {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--success);
        }

        .system-text {
            font-size: 0.95em;
            line-height: 1.5;
            min-height: 45px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            background: #1e173b;
            color: var(--text-main);
            border: 1px solid #4c1d95;
            padding: 12px;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--matrix-glow);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            color: #fff;
        }

        .log-stream {
            margin-top: 20px;
            font-size: 0.8em;
            color: var(--text-muted);
            height: 60px;
            overflow-y: auto;
            border-top: 1px solid rgba(107, 96, 156, 0.2);
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="engine-core">
    <div class="header">
        <span style="font-weight: bold;">MODULE // COSMICOS_v1.0</span>
        <span class="mode-badge" id="view-toggle" onclick="togglePerspective()">Perspective: Lore</span>
    </div>

    <div class="metric-display" id="status-card">
        <div style="font-size: 0.75em; color: var(--text-muted); margin-bottom: 5px;" id="label-context">CURRENT DIALECTIC</div>
        <div class="system-text" id="display-text">The KitchenTable node is completely stable. The dynamic balance of code and story is perfectly aligned.</div>
    </div>

    <div class="controls">
        <button onclick="generateForecast()">Query Forecast</button>
        <button onclick="simulatedReload()" style="border-color: #b45309;">Trigger Hot-Reload</button>
    </div>

    <div class="log-stream" id="event-logs">
        <div>[SYSTEM]: COSMICOS initialized. Ready for anonymous traffic.</div>
    </div>
</div>

<script>
    let currentMode = 'lore'; // Toggles between 'lore' and 'tech'
    let iframeGuardActive = false;

    const dataPools = {
        lore: [
            "The Commitpaladin has cleared the shadows. The repository heart beats smoothly.",
            "Holy Ghost Tea levels are optimal. Take a tactical breath.",
            "PastaGuard detects zero tangled routing anomalies in the current quadrant.",
            "The Archivist logs a moment of profound architectural peace."
        ],
        tech: [
            "git status: working tree clean. Zero modified files detected.",
            "Local server running flawlessly on localhost:8080.",
            "DOM status: 0xE2808B phantom character count is exactly 0.",
            "State management guard flags are fully synced with active DOM frames."
        ]
    };

    function logEvent(text) {
        const logs = document.getElementById('event-logs');
        const entry = document.createElement('div');
        entry.textContent = `[${new Date().toLocaleTimeString()}]: ${text}`;
        logs.appendChild(entry);
        logs.scrollTop = logs.scrollHeight;
    }

    function togglePerspective() {
        currentMode = currentMode === 'lore' ? 'tech' : 'lore';
        document.getElementById('view-toggle').textContent = `Perspective: ${currentMode}`;
        document.getElementById('label-context').textContent = currentMode === 'lore' ? 'CURRENT DIALECTIC' : 'COMPILER STATE';
        generateForecast();
        logEvent(`Switched tracking matrix to view-mode: ${currentMode}`);
    }

    function generateForecast() {
        const pool = dataPools[currentMode];
        const randomText = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('display-text').textContent = randomText;
    }

    function simulatedReload() {
        // Simulates the exact Perchance preview hot-reload anomaly we fixed!
        iframeGuardActive = true; 
        const card = document.getElementById('status-card');
        
        card.style.borderLeftColor = 'var(--alert)';
        document.getElementById('display-text').textContent = "WARNING: Hot-reload detected. Checking initialization structures...";
        logEvent("Hot-reload cycle initiated. Enforcing active iframe state verification.");

        // Defensive Programming / PastaGuard circuit breaker in action:
        setTimeout(() => {
            iframeGuardActive = false; // Graceful self-recovery without a hard crash
            card.style.borderLeftColor = 'var(--success)';
            logEvent("Circuit Breaker Active: Successfully verified DOM state. Stale flags cleared.");
            generateForecast();
        }, 1200);
    }
</script>

</body>
</html>
