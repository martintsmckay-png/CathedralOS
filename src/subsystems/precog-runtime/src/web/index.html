<div class="panel" id="insight-dashboard-panel">
  <div class="panel-header">Observatory Insight Dashboard</div>
  <div class="dashboard-grid">
    <div class="metric-card" id="card-cadence">
      <label>CADENCE VARIANCE</label>
      <div class="metric-value">0.00</div>
    </div>
    <div class="metric-card" id="card-drift">
      <label>DRIFT ANOMALIES</label>
      <div class="metric-value">0</div>
    </div>
    <div class="metric-card" id="card-integrity">
      <label>LINEAGE STABILITY</label>
      <div class="metric-value">100%</div>
    </div>
  </div>
  <div class="telemetry-chart-container">
    <canvas id="telemetryGraph" width="400" height="150"></canvas>
  </div>
</div>
