<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CathedralOS Control Panel</title>
  <style>
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    h1 { color: #ff8a00; }
    .status { margin: 1rem 0; }
    .ok { color: #00d9a5; }
    .code { background: #1a1a1a; padding: 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🏠 CathedralOS Control Panel</h1>
  <div class="status">
    <strong>Home Anchor:</strong> <span class="ok">ONLINE</span><br>
    <strong>Table Checksum:</strong> <span class="ok">VERIFIED</span><br>
    <strong>Kitten:</strong> <span class="ok">INVESTIGATING</span>
  </div>
  <p>
    <span class="code">🍞 Toast Memory: LOADED</span><br>
    <span class="code">🍊 Marmalade Protocol: READY</span>
  </p>
</body>
</html>
